<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Koina logomark</title>
  <desc id="desc">
    A minimal symbol made from four equal rounded modules converging on a
    shared center, representing common infrastructure, openness, and
    collaboration.
  </desc>
  <defs>
    <mask id="core-cutout" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="256" height="256" fill="#fff" />
      <rect
        x="102"
        y="102"
        width="52"
        height="52"
        rx="16"
        fill="#000"
      />
    </mask>
  </defs>
  <g fill="currentColor" transform="rotate(45 128 128)" mask="url(#core-cutout)">
    <rect x="76" y="24" width="104" height="88" rx="28" />
    <rect x="76" y="144" width="104" height="88" rx="28" />
    <rect x="24" y="76" width="88" height="104" rx="28" />
    <rect x="144" y="76" width="88" height="104" rx="28" />
  </g>
</svg>
