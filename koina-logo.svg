<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 256 256"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Koina logomark</title>
  <desc id="desc">
    A minimal symbol made from four rounded modules meeting around a shared
    civic core, representing common infrastructure, openness, and
    collaboration.
  </desc>
  <defs>
    <linearGradient id="north" x1="74" y1="24" x2="182" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17314A" />
      <stop offset="1" stop-color="#356EE0" />
    </linearGradient>
    <linearGradient id="east" x1="144" y1="74" x2="232" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A8FFF" />
      <stop offset="1" stop-color="#7DBDFF" />
    </linearGradient>
    <linearGradient id="south" x1="74" y1="144" x2="182" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#27AE99" />
      <stop offset="1" stop-color="#174B54" />
    </linearGradient>
    <linearGradient id="west" x1="24" y1="74" x2="112" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#143549" />
      <stop offset="1" stop-color="#2CB39C" />
    </linearGradient>
    <radialGradient id="gloss" cx="24%" cy="16%" r="88%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="0.34" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="core" x1="98" y1="98" x2="158" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFEFF" />
      <stop offset="1" stop-color="#E8F7F3" />
    </linearGradient>
    <filter id="shadow" x="-24%" y="-24%" width="148%" height="148%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#102236" flood-opacity="0.12" />
    </filter>
  </defs>
  <g transform="rotate(45 128 128)">
    <rect x="74" y="24" width="108" height="88" rx="28" fill="#17314A" />
    <rect x="74" y="144" width="108" height="88" rx="28" fill="#17314A" />
    <rect x="24" y="74" width="88" height="108" rx="28" fill="#17314A" />
    <rect x="144" y="74" width="88" height="108" rx="28" fill="#17314A" />
  </g>
  <g transform="rotate(45 128 128)" filter="url(#shadow)">
    <g>
      <rect x="74" y="24" width="108" height="88" rx="28" fill="url(#north)" />
      <rect x="74" y="24" width="108" height="88" rx="28" fill="url(#gloss)" />
    </g>
    <g>
      <rect x="144" y="74" width="88" height="108" rx="28" fill="url(#east)" />
      <rect x="144" y="74" width="88" height="108" rx="28" fill="url(#gloss)" />
    </g>
    <g>
      <rect x="74" y="144" width="108" height="88" rx="28" fill="url(#south)" />
      <rect x="74" y="144" width="108" height="88" rx="28" fill="url(#gloss)" />
    </g>
    <g>
      <rect x="24" y="74" width="88" height="108" rx="28" fill="url(#west)" />
      <rect x="24" y="74" width="88" height="108" rx="28" fill="url(#gloss)" />
    </g>
  </g>
  <rect
    x="98"
    y="98"
    width="60"
    height="60"
    rx="18"
    transform="rotate(45 128 128)"
    fill="url(#core)"
    stroke="#FFFFFF"
    stroke-opacity="0.55"
    stroke-width="2"
  />
</svg>
